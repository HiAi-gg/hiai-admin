name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  release-gates:
    name: Headless release gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: cd backend && bun install --frozen-lockfile
      - run: cd app && bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run lint
      - run: bun run typecheck
      - name: Run backend and frontend tests (CI defaults)
        env:
          REDIS_URL: "redis://127.0.0.1:6379/0"
          DATABASE_URL: "postgres://postgres:ci-local-test-pass-do-not-use-in-production@127.0.0.1:5432/ci_hiai_admin"
          BETTER_AUTH_SECRET: "ci-local-test-secret-do-not-use-in-production-abcdefghijklmnopqrstuvwxyz"
          BETTER_AUTH_URL: "http://127.0.0.1:3000"
        run: bun run test
      - name: Build (CI defaults)
        env:
          REDIS_URL: "redis://127.0.0.1:6379/0"
          DATABASE_URL: "postgres://postgres:ci-local-test-pass-do-not-use-in-production@127.0.0.1:5432/ci_hiai_admin"
          BETTER_AUTH_SECRET: "ci-local-test-secret-do-not-use-in-production-abcdefghijklmnopqrstuvwxyz"
          BETTER_AUTH_URL: "http://127.0.0.1:3000"
        run: bun run build
      - name: Verify generic headless package contents
        run: |
          ! rg -n -i 'webs|webs\.cool|MAIL_API_URL|MAIL_API_KEY' \
            backend/src/modules/auth-events \
            backend/src/modules/integrations \
            backend/src/api/routes/integration-tokens.ts \
            backend/src/api/routes/integration-site-access.ts
          test -f backend/drizzle/0006_atomic_site_access.sql
          test -f backend/drizzle/0007_site_invites.sql

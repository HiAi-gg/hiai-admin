name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: none

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  BUN_VERSION: 1.3.14

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hiai-admin-backend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=hiai-admin-backend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Compute image metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hiai-admin-frontend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=hiai-admin-frontend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          {
            echo "## What's Changed"
            echo ""
            gh api \
              --paginate \
              "repos/${{ github.repository }}/compare/$(gh api repos/${{ github.repository }}/tags --jq '.[].name | select(test(\"^v[0-9]\"))' | tail -1 2>/dev/null || echo "$(git rev-list --max-parents=0 HEAD)")...${TAG}" \
              --jq '.commits[] | "- \(.title) (\(.sha[0:7]))"' 2>/dev/null || echo "- Initial $TAG release"
            echo ""
            echo "## Docker Images"
            echo ""
            echo "### Backend"
            echo ""
            echo "\`\`\`"
            echo "docker pull ghcr.io/${{ github.repository }}/hiai-admin-backend:${VERSION}"
            echo "docker pull ghcr.io/${{ github.repository }}/hiai-admin-backend:latest"
            echo "\`\`\`"
            echo ""
            echo "### Frontend"
            echo ""
            echo "\`\`\`"
            echo "docker pull ghcr.io/${{ github.repository }}/hiai-admin-frontend:${VERSION}"
            echo "docker pull ghcr.io/${{ github.repository }}/hiai-admin-frontend:latest"
            echo "\`\`\`"
            echo ""
            echo "## Quick Start"
            echo ""
            echo "\`\`\`bash"
            echo "git checkout ${TAG}"
            echo "cp .env.example .env  # fill in required values"
            echo "docker compose -f docker-compose.yml up -d"
            echo "\`\`\`"
          } > release-body.md
          cat release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          generate_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies (backend + app)
        run: |
          cd backend && bun install --frozen-lockfile || bun install
          cd ../app && bun install

      - name: Run tests
        run: bun run test:unit

      - name: Publish to npm
        run: |
          npm config set "//registry.npmjs.org/:_authToken" "${{ secrets.NPM_TOKEN }}"
          npm publish --provenance --access public

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: latest

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            backend/node_modules
            app/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('backend/bun.lock', 'app/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile || bun install

      - name: Install app deps
        working-directory: app
        run: bun install

      - name: Biome lint (backend)
        working-directory: backend
        run: bun run lint

      - name: Biome lint (app)
        working-directory: app
        run: bun run lint

      - name: Biome format check (backend)
        working-directory: backend
        run: bun run format:check

      - name: Biome format check (app)
        working-directory: app
        run: bun run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            backend/node_modules
            app/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('backend/bun.lock', 'app/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile || bun install

      - name: Install app deps
        working-directory: app
        run: bun install

      - name: Typecheck backend
        working-directory: backend
        run: bun run typecheck

      - name: Typecheck app
        working-directory: app
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            backend/node_modules
            app/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('backend/bun.lock', 'app/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile || bun install

      - name: Install app deps
        working-directory: app
        run: bun install

      - name: Build backend
        working-directory: backend
        run: bun run build

      - name: Build app
        working-directory: app
        run: bun run build

      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 3
          if-no-files-found: error

      - name: Upload app build
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app/build
          retention-days: 3
          if-no-files-found: error

  test:
    name: Test (unit + integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: hiai_admin_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hiai_admin_test
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: test-secret-must-be-at-least-32-characters-long-please
      BETTER_AUTH_URL: http://localhost:50200
      API_PORT: "50200"
      NODE_ENV: test
      HIAI_ADMIN_API: http://localhost:50200

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            backend/node_modules
            app/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('backend/bun.lock', 'app/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile || bun install

      - name: Install app deps
        working-directory: app
        run: bun install

      - name: Apply database schema
        working-directory: backend
        run: bun run db:push

      - name: Seed database
        working-directory: backend
        run: bun run db:seed
        continue-on-error: true

      - name: Build backend
        working-directory: backend
        run: bun run build

      - name: Start backend (background)
        working-directory: backend
        run: |
          nohup bun run start > backend.log 2>&1 &
          echo $! > backend.pid
          echo "Backend started with PID $(cat backend.pid)"

      - name: Wait for backend health
        run: |
          echo "Waiting for backend on http://localhost:50200/api/health ..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:50200/api/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              curl -fsS http://localhost:50200/api/health
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend failed to become healthy in 60s"
          cat backend.log || true
          exit 1

      - name: Run backend unit tests
        working-directory: backend
        run: bun run test:unit || echo "No unit tests yet — that's OK"

      - name: Run backend integration tests
        working-directory: backend
        run: bun run test:integration
        env:
          HIAI_ADMIN_API: http://localhost:50200

      - name: Stop backend
        if: always()
        working-directory: backend
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" 2>/dev/null || true
            rm -f backend.pid
          fi

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/backend.log
          retention-days: 3

  docker:
    name: Docker build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: hiai-admin-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: hiai-admin-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test backend image
        run: |
          docker run --rm -d \
            --name hiai-admin-backend-smoke \
            -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/hiai_admin_test \
            -e REDIS_URL=redis://localhost:6379 \
            -e BETTER_AUTH_SECRET=test-secret-must-be-at-least-32-characters-long-please \
            -e BETTER_AUTH_URL=http://localhost:50200 \
            -e API_PORT=50200 \
            -p 50200:3000 \
            hiai-admin-backend:ci-${{ github.sha }}
          sleep 5
          docker ps -a
          docker logs hiai-admin-backend-smoke || true
          docker rm -f hiai-admin-backend-smoke || true

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  BUN_VERSION: 1.3.14
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            backend/node_modules
            app/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('backend/bun.lock', 'app/package.json', 'app/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile || bun install

      - name: Install app deps
        working-directory: app
        run: bun install

      - name: Biome lint (backend)
        working-directory: backend
        run: bun run lint

      - name: Biome lint (app)
        working-directory: app
        run: bun run lint

      - name: Biome format check (backend)
        working-directory: backend
        run: bun run format:check

      - name: Biome format check (app)
        working-directory: app
        run: bun run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: placeholder-must-be-at-least-32-characters-long-ok
      BETTER_AUTH_URL: http://localhost:50200
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            backend/node_modules
            app/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('backend/bun.lock', 'app/package.json', 'app/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile || bun install

      - name: Install app deps
        working-directory: app
        run: bun install

      - name: Typecheck backend
        working-directory: backend
        run: bun run typecheck

      - name: Typecheck app
        working-directory: app
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: placeholder-must-be-at-least-32-characters-long-ok
      BETTER_AUTH_URL: http://localhost:50200
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            backend/node_modules
            app/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('backend/bun.lock', 'app/package.json', 'app/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile || bun install

      - name: Install app deps
        working-directory: app
        run: bun install

      - name: Build backend
        working-directory: backend
        run: bun run build

      - name: Build app
        working-directory: app
        run: bun run build

      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 3
          if-no-files-found: error

      - name: Upload app build
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app/build
          retention-days: 3
          if-no-files-found: error

  test:
    name: Test (unit + integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: hiai_admin_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hiai_admin_test
      REDIS_URL: redis://localhost:6379
      DB_AUTO_PUSH: true
      BETTER_AUTH_SECRET: test-secret-must-be-at-least-32-characters-long-please
      BETTER_AUTH_URL: http://localhost:50200
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      API_PORT: "50200"
      NODE_ENV: test
      HIAI_ADMIN_API: http://localhost:50200

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            backend/node_modules
            app/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('backend/bun.lock', 'app/package.json', 'app/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: bun install --frozen-lockfile || bun install

      - name: Install app deps
        working-directory: app
        run: bun install

      - name: Apply database schema
        working-directory: backend
        run: bun run db:push

      - name: Seed database
        working-directory: backend
        run: bun run db:seed
        continue-on-error: true

      - name: Build backend
        working-directory: backend
        run: bun run build

      - name: Start backend (background)
        working-directory: backend
        run: |
          nohup bun run start > backend.log 2>&1 &
          echo $! > backend.pid
          echo "Backend started with PID $(cat backend.pid)"

      - name: Wait for backend health
        run: |
          echo "Waiting for backend on http://localhost:50200/api/health ..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:50200/api/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              curl -fsS http://localhost:50200/api/health
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend failed to become healthy in 60s"
          cat backend/backend.log || true
          exit 1

      - name: Run backend unit tests
        working-directory: backend
        run: bun run test:unit || echo "No unit tests yet — that's OK"

      - name: Run backend integration tests
        working-directory: backend
        run: bun run test:integration
        env:
          HIAI_ADMIN_API: http://localhost:50200

      - name: Stop backend
        if: always()
        working-directory: backend
        run: |
          if [ -f backend/backend.pid ]; then
            kill "$(cat backend/backend.pid)" 2>/dev/null || true
            rm -f backend/backend.pid
          fi

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/backend.log
          retention-days: 3

  docker-verify:
    name: Docker build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: hiai-admin-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          push: false
          load: true
          tags: hiai-admin-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test backend image
        run: |
          docker run --rm -d \
            --name hiai-admin-backend-smoke \
            -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/hiai_admin_test \
            -e REDIS_URL=redis://localhost:6379 \
            -e BETTER_AUTH_SECRET=test-secret-must-be-at-least-32-characters-long-please \
            -e BETTER_AUTH_URL=http://localhost:50200 \
            -e API_PORT=50200 \
            -p 50200:3000 \
            hiai-admin-backend:ci-${{ github.sha }}
          sleep 5
          docker ps -a
          docker logs hiai-admin-backend-smoke || true
          docker rm -f hiai-admin-backend-smoke || true

  docker-push:
    name: Build & push Docker images
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint, typecheck, build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hiai-admin-backend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=hiai-admin-backend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Compute image metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hiai-admin-frontend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=hiai-admin-frontend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  npm-publish:
    name: Publish NPM Package
    needs: [lint, typecheck, build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: |
          cd backend && bun install --frozen-lockfile || bun install
          cd ../app && bun install

      - name: Set version from tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          CLEAN_VERSION="${TAG_VERSION#v}"
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${CLEAN_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Publish to npm
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@hiai-gg/hiai-admin@${version}" version >/dev/null 2>&1; then
            echo "::notice::@hiai-gg/hiai-admin@${version} already on npm — skipping."
          else
            npm publish --access public --provenance --ignore-scripts
          fi

  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [docker-push, npm-publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          {
            echo "## What's Changed"
            echo ""
            gh api \
              --paginate \
              "repos/${{ github.repository }}/compare/$(gh api repos/${{ github.repository }}/tags --jq '.[].name | select(test(\"^v[0-9]\"))' | tail -1 2>/dev/null || echo "$(git rev-list --max-parents=0 HEAD)")...${TAG}" \
              --jq '.commits[] | "- \(.title) (\(.sha[0:7]))"' 2>/dev/null || echo "- Initial $TAG release"
            echo ""
            echo "## Docker Images"
            echo ""
            echo "### Backend"
            echo ""
            echo "\`\`\`"
            echo "docker pull ghcr.io/${{ github.repository }}/hiai-admin-backend:${VERSION}"
            echo "docker pull ghcr.io/${{ github.repository }}/hiai-admin-backend:latest"
            echo "\`\`\`"
            echo ""
            echo "### Frontend"
            echo ""
            echo "\`\`\`"
            echo "docker pull ghcr.io/${{ github.repository }}/hiai-admin-frontend:${VERSION}"
            echo "docker pull ghcr.io/${{ github.repository }}/hiai-admin-frontend:latest"
            echo "\`\`\`"
            echo ""
            echo "## Quick Start"
            echo ""
            echo "\`\`\`bash"
            echo "git checkout ${TAG}"
            echo "cp .env.example .env  # fill in required values"
            echo "docker compose -f docker-compose.yml up -d"
            echo "\`\`\`"
          } > release-body.md
          cat release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          generate_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}